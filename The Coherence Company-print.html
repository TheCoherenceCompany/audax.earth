<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Coherence Company · Humans &amp; AI · Wiser Together</title>
  <link rel="icon" type="image/svg+xml" href="assets/coherence-logo.svg">
  <link rel="stylesheet" href="site/styles.css">

  <style>
    /* ============================================================
       Print styles — page break by section, kill chrome, force colors.
       ============================================================ */
    @page { size: A4 portrait; margin: 12mm 0; }

    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        animation: none !important;
        transition: none !important;
      }
      html, body { background: #fff !important; }

      /* Kill the sticky nav and the modal/toast — they don't belong on paper. */
      .nav { display: none !important; }
      .toast, .modal-backdrop { display: none !important; }

      /* Section page breaks. Sections in order:
         hero, problem, missing-layer, journey, seed, invite, process, join */
      .hero          { break-after:  page; }
      .problem       { break-after:  page; }
      .missing-layer { break-after:  page; }
      .journey       { break-after:  page; }
      .seed          { break-after:  page; }
      .invite        { break-after:  page; }
      .process       { break-after:  page; }
      .join          { break-after:  page; }

      /* Don't split mid-card. */
      .stat, .layer-card, .invite-chip, .journey-step, .session,
      .journey-callout, .invite-note, .problem-conclusion,
      .seed-meta-item, .hero-meta, .footer-inner {
        break-inside: avoid;
      }

      /* Tighten section padding so each section roughly fits one A4 page. */
      .section { padding: 36px 0 !important; }
      .hero { min-height: auto !important; padding: 36px 0 48px !important; }
      .join { padding: 56px 0 !important; }

      /* Hero — keep gradient + watermark intact. */
      .hero-watermark { opacity: 0.10 !important; }
      .hero-vertical { display: none !important; } /* would overflow page edge */
      .hero-h1 { font-size: 56px !important; }
      .hero-sub { font-size: 17px !important; margin-bottom: 28px !important; }
      .hero-meta { margin-top: 32px !important; padding-top: 18px !important; }

      /* Big stat numbers — keep but cap. */
      .stat-num { font-size: 60px !important; }
      .section-title { font-size: 40px !important; margin-bottom: 22px !important; }
      .section-dek { font-size: 16px !important; }
      .problem-conclusion h3 { font-size: 28px !important; }
      .problem-conclusion { margin-top: 48px !important; padding-top: 32px !important; gap: 48px !important; }

      /* Journey track — tighten. */
      .journey-track { margin-top: 56px !important; }
      .journey-callout { margin-top: 48px !important; }
      .journey-intro { gap: 48px !important; margin-top: 32px !important; }

      /* Seed dark section — print backgrounds. */
      .seed { background: #0F0F0F !important; }
      .seed-meta { margin-top: 48px !important; }

      /* Invite & process — tighten. */
      .invite-grid { margin-top: 48px !important; gap: 12px !important; }
      .invite-note { margin-top: 40px !important; }
      .sessions { margin-top: 48px !important; }
      .session { padding: 24px 0 !important; gap: 36px !important; }
      .session-num { font-size: 44px !important; }

      /* Join. */
      .join-h2 { font-size: 56px !important; }
      .join-mark { width: 64px !important; height: 64px !important; margin-bottom: 28px !important; }
      .join-watermark { opacity: 0.12 !important; }

      /* Footer kept on the join page; or page break for cleanliness. */
      .footer { border-top: 1px solid #E6E6E6 !important; }

      /* Drop entrance animations entirely; they're style-baked-in opacity:0. */
      .reveal, .reveal-2, .reveal-3, .reveal-4 {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }

      /* Prevent any horizontal scroll overflow at print width. */
      body { overflow: visible !important; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="site/components-top.jsx"></script>
  <script type="text/babel" src="site/components-bottom.jsx"></script>
  <script type="text/babel" src="site/app.jsx"></script>

  <!-- Auto-print: wait for fonts, Babel-transformed scripts, and a settle delay. -->
  <script type="text/babel">
    (async () => {
      try {
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
        // Wait until the React tree has rendered something.
        const start = Date.now();
        while (!document.querySelector(".hero-h1") && Date.now() - start < 6000) {
          await new Promise(r => setTimeout(r, 100));
        }
        // Let lucide finish swapping <i> placeholders for <svg>s.
        if (window.lucide) window.lucide.createIcons();
        await new Promise(r => setTimeout(r, 700));
        window.print();
      } catch (e) {
        console.error("auto-print failed", e);
      }
    })();
  </script>
</body>
</html>
