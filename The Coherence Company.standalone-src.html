<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Coherence Company · Humans &amp; AI · Wiser Together</title>
  <meta name="description" content="The Coherence Company — coordination infrastructure for the AI age. We're building AI for sensemaking and collaboration technology for wisdom at scale.">
  <link rel="icon" type="image/svg+xml" href="assets/coherence-logo.svg">
  <link rel="stylesheet" href="site/styles.css">

  <!-- Resources referenced as strings in JSX — lifted so the bundler can inline them. -->
  <meta name="ext-resource-dependency" content="assets/coherence-logo.svg"           data-resource-id="logoSvg" />
  <meta name="ext-resource-dependency" content="assets/Logo.png"                     data-resource-id="logoPng" />
  <meta name="ext-resource-dependency" content="assets/backgrounds/calligraphy-30.png" data-resource-id="calliHero" />
  <meta name="ext-resource-dependency" content="assets/backgrounds/calligraphy-28.png" data-resource-id="calliSeed" />
  <meta name="ext-resource-dependency" content="assets/backgrounds/calligraphy-11.png" data-resource-id="calliJoin" />

  <!-- Splash thumbnail: simple knot glyph over the brand teal gradient. -->
  <template id="__bundler_thumbnail" data-bg-color="#EEFBFB">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#4BDBDB"/>
          <stop offset="50%" stop-color="#B1EFEF"/>
          <stop offset="100%" stop-color="#FFFFFF"/>
        </linearGradient>
      </defs>
      <rect width="1200" height="800" fill="url(#g)"/>
      <g transform="translate(600 400)" fill="none" stroke="#0F0F0F" stroke-width="6" stroke-linecap="round">
        <circle cx="0" cy="0" r="120" opacity="0.85"/>
        <path d="M -110 -30 C -60 -110, 60 -110, 110 -30" opacity="0.85"/>
        <path d="M -90 40 C -30 90, 30 90, 90 40" opacity="0.85"/>
        <path d="M -70 -10 C -30 -50, 30 -50, 70 -10" opacity="0.7"/>
        <circle cx="-160" cy="-40" r="4" fill="#0F0F0F" stroke="none"/>
        <circle cx="170" cy="20" r="4" fill="#0F0F0F" stroke="none"/>
      </g>
      <text x="600" y="640" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="34" fill="#0F0F0F" opacity="0.7">The Coherence Company</text>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="site/components-top.standalone.jsx"></script>
  <script type="text/babel" src="site/components-bottom.standalone.jsx"></script>
  <script type="text/babel" src="site/app.jsx"></script>
