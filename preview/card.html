<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:24px 32px; background:var(--surface-off);">
  <div class="label">Card · resting</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:18px;">
    <article style="background:#fff; border:1px solid var(--border-1); border-radius:14px; padding:24px;">
      <div style="font-size:11px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-500); margin-bottom:14px;">Identity</div>
      <div style="font-size:22px; font-weight:300; letter-spacing:-0.01em; color:var(--ink-900); margin-bottom:8px;">Holm &amp; Vidal</div>
      <div style="font-size:13px; font-weight:300; color:var(--ink-600); line-height:1.55;">A quiet identity system for a 30-year-old architecture practice.</div>
    </article>
    <article style="background:#fff; border:1px solid var(--border-1); border-radius:14px; padding:24px; box-shadow: 0 2px 8px rgba(15,15,15,0.04), 0 1px 2px rgba(15,15,15,0.03); transform: translateY(-1px);">
      <div style="font-size:11px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-500); margin-bottom:14px;">Product · hover</div>
      <div style="font-size:22px; font-weight:300; letter-spacing:-0.01em; color:var(--ink-900); margin-bottom:8px;">Field Notes app</div>
      <div style="font-size:13px; font-weight:300; color:var(--ink-600); line-height:1.55;">An offline-first journal for fieldwork researchers.</div>
    </article>
  </div>
  <div style="font-size:12px; color:var(--ink-500);">Resting: 1px hairline, no shadow. Hover: shadow-2 + 1px lift. Never a colored card.</div>
</body></html>
