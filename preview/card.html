<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:24px 32px; background:var(--surface-paper);">
  <div class="label">Card · resting + hover</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:18px;">
    <article style="background:#fff; border:1px solid var(--border-1); border-radius:14px; padding:24px;">
      <div style="font-size:11px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-500); margin-bottom:14px;">Circle · resting</div>
      <div style="font-family: var(--font-display); font-size:24px; font-weight:400; letter-spacing:-0.02em; color:var(--ink-900); margin-bottom:8px;">Stewards</div>
      <div style="font-size:13px; font-weight:300; color:var(--ink-600); line-height:1.55;">Six humans, two agents. Holding the long arc of the platform's governance.</div>
    </article>
    <article style="background:#fff; border:1px solid var(--border-1); border-radius:14px; padding:24px; box-shadow: 0 2px 10px rgba(20,19,14,0.05), 0 1px 2px rgba(20,19,14,0.04); transform: translateY(-1px);">
      <div style="font-size:11px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-500); margin-bottom:14px;">Circle · hover</div>
      <div style="font-family: var(--font-display); font-size:24px; font-weight:400; letter-spacing:-0.02em; color:var(--ink-900); margin-bottom:8px;">Field Notes</div>
      <div style="font-size:13px; font-weight:300; color:var(--ink-600); line-height:1.55;">A working circle for the agents-in-research. Meets on Mondays.</div>
    </article>
  </div>
  <div style="font-size:12px; color:var(--ink-500);">Resting: 1px hairline, no shadow. Hover: shadow-2 + 1px lift. Never a coloured card.</div>
</body></html>
