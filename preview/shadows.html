<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="padding:32px; background:var(--surface-paper);">
  <div class="label">Shadows · whisper-soft</div>
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:20px;">
    <div style="text-align:center;">
      <div style="height:88px; background:#fff; border-radius:12px; border:1px solid var(--border-1);"></div>
      <div class="meta" style="margin-top:10px;">0 · hairline</div>
    </div>
    <div style="text-align:center;">
      <div style="height:88px; background:#fff; border-radius:12px; box-shadow: 0 1px 2px rgba(20,19,14,0.04), 0 1px 1px rgba(20,19,14,0.03);"></div>
      <div class="meta" style="margin-top:10px;">1 · rest</div>
    </div>
    <div style="text-align:center;">
      <div style="height:88px; background:#fff; border-radius:12px; box-shadow: 0 2px 8px rgba(20,19,14,0.04), 0 1px 2px rgba(20,19,14,0.03);"></div>
      <div class="meta" style="margin-top:10px;">2 · hover</div>
    </div>
    <div style="text-align:center;">
      <div style="height:88px; background:#fff; border-radius:12px; box-shadow: 0 8px 24px rgba(20,19,14,0.06), 0 2px 6px rgba(20,19,14,0.03);"></div>
      <div class="meta" style="margin-top:10px;">3 · lift</div>
    </div>
  </div>
  <div style="font-size:12px; color:var(--ink-500);">Vertical offset only. No spread. No colored shadows except <span style="font-family:var(--font-mono); color:var(--ink-700);">--shadow-teal</span> on primary CTA hover.</div>
</body></html>
