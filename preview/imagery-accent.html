    Enso circles, calligraphic gestures, halftone moons. Embedded in cards, section openers, dividers. Never tinted; never stretched. <span style="font-family:var(--font-mono); color:var(--ink-700);">mix-blend-mode: multiply</span> lets them sit on parchment without a white border.
