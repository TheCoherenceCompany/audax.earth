<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="label">Semantic · state</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:14px;">
    <div class="col" style="gap:8px;">
      <div style="height:48px; border-radius:8px; background:#3F8657;"></div>
      <div style="font-size:13px; color:var(--ink-700);">Info</div>
      <div class="meta">#3F8657</div>
    </div>
    <div class="col" style="gap:8px;">
      <div style="height:48px; border-radius:8px; background:#2D6B41;"></div>
      <div style="font-size:13px; color:var(--ink-700);">Success</div>
      <div class="meta">#2D6B41</div>
    </div>
    <div class="col" style="gap:8px;">
      <div style="height:48px; border-radius:8px; background:#B8884A;"></div>
      <div style="font-size:13px; color:var(--ink-700);">Warning</div>
      <div class="meta">#B8884A</div>
    </div>
    <div class="col" style="gap:8px;">
      <div style="height:48px; border-radius:8px; background:#9E3B2E;"></div>
      <div style="font-size:13px; color:var(--ink-700);">Danger</div>
      <div class="meta">#9E3B2E</div>
    </div>
  </div>
  <div style="font-size:12px; color:var(--ink-500);">Used sparingly. Only when functionally required — never decoratively.</div>
</body></html>
