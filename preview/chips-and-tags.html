<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .chip { display:inline-flex; align-items:center; gap:6px; font-family: var(--font-sans); font-weight: 400; font-size: 13px; padding: 6px 12px; border-radius: 999px; line-height: 1; }
  .chip-default { background: var(--ink-050); color: var(--ink-700); border: 1px solid var(--border-1); }
  .chip-active { background: var(--teal-800); color: #fff; }
  .chip-accent { background: var(--teal-050); color: var(--teal-900); border: 1px solid var(--teal-200); }
  .chip-dot::before { content:""; width:6px; height:6px; border-radius:999px; background: currentColor; opacity:0.8; }
</style>
</head>
<body style="padding:28px 32px;">
  <div class="label">Chips · tags · filters</div>
  <div class="row" style="flex-wrap:wrap; gap:8px;">
    <span class="chip chip-active">All</span>
    <span class="chip chip-default">Identity</span>
    <span class="chip chip-default">Product</span>
    <span class="chip chip-default">Editorial</span>
    <span class="chip chip-default">Research</span>
  </div>
  <div class="row" style="flex-wrap:wrap; gap:8px;">
    <span class="chip chip-accent chip-dot">Live</span>
    <span class="chip chip-default chip-dot" style="color:var(--ink-500);">Draft</span>
    <span class="chip chip-default chip-dot" style="color:var(--ink-500);">Archived</span>
  </div>
  <div style="font-size:12px; color:var(--ink-500);">Filters live above grids. State chips live inline. Never stack chips inside a card.</div>
</body></html>
