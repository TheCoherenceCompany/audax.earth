<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="label">Ink · warm neutrals + parchment</div>
  <div style="display:grid; grid-template-columns: repeat(11, 1fr); gap:6px;">
    <div><div style="height:62px; border-radius:6px; background:#FFFFFF; border:1px solid var(--border-1);"></div><div class="meta" style="margin-top:6px;">white</div></div>
    <div><div style="height:62px; border-radius:6px; background:#FBFAF3; border:1px solid var(--border-2);"></div><div class="meta" style="margin-top:6px;">parch.</div></div>
    <div><div style="height:62px; border-radius:6px; background:#F7F5EC; border:1px solid var(--border-2);"></div><div class="meta" style="margin-top:6px;">050</div></div>
    <div><div style="height:62px; border-radius:6px; background:#EFEDE4;"></div><div class="meta" style="margin-top:6px;">100</div></div>
    <div><div style="height:62px; border-radius:6px; background:#E3E0D6;"></div><div class="meta" style="margin-top:6px;">200</div></div>
    <div><div style="height:62px; border-radius:6px; background:#C9C6BD;"></div><div class="meta" style="margin-top:6px;">300</div></div>
    <div><div style="height:62px; border-radius:6px; background:#A8A59B;"></div><div class="meta" style="margin-top:6px;">400</div></div>
    <div><div style="height:62px; border-radius:6px; background:#807D72;"></div><div class="meta" style="margin-top:6px; color:#A8A59B;">500</div></div>
    <div><div style="height:62px; border-radius:6px; background:#5C5A50;"></div><div class="meta" style="margin-top:6px; color:#A8A59B;">600</div></div>
    <div><div style="height:62px; border-radius:6px; background:#3A3830;"></div><div class="meta" style="margin-top:6px; color:#A8A59B;">700</div></div>
    <div><div style="height:62px; border-radius:6px; background:#14130E;"></div><div class="meta" style="margin-top:6px; color:#A8A59B;">900</div></div>
  </div>
  <div style="font-size:12px; color:var(--ink-500);">Warm, slightly green-tinted. <span style="font-family:var(--font-mono); color:var(--ink-700);">parchment · #FBFAF3</span> is the page background; <span style="font-family:var(--font-mono); color:var(--ink-700);">900 · #14130E</span> is the ink black. Never blue-cool.</div>
</body></html>
