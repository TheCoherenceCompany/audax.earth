<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="label">Ink · neutrals</div>
  <div style="display:grid; grid-template-columns: repeat(10, 1fr); gap:6px;">
    <div><div style="height:62px; border-radius:6px; background:#FFFFFF; border:1px solid var(--border-1);"></div><div class="meta" style="margin-top:6px;">white</div></div>
    <div><div style="height:62px; border-radius:6px; background:#F8F8F8; border:1px solid var(--border-2);"></div><div class="meta" style="margin-top:6px;">050</div></div>
    <div><div style="height:62px; border-radius:6px; background:#F1F1F1;"></div><div class="meta" style="margin-top:6px;">100</div></div>
    <div><div style="height:62px; border-radius:6px; background:#E6E6E6;"></div><div class="meta" style="margin-top:6px;">200</div></div>
    <div><div style="height:62px; border-radius:6px; background:#C4C4C4;"></div><div class="meta" style="margin-top:6px;">300</div></div>
    <div><div style="height:62px; border-radius:6px; background:#9A9A9A;"></div><div class="meta" style="margin-top:6px;">400</div></div>
    <div><div style="height:62px; border-radius:6px; background:#777777;"></div><div class="meta" style="margin-top:6px; color:#9A9A9A;">500</div></div>
    <div><div style="height:62px; border-radius:6px; background:#555555;"></div><div class="meta" style="margin-top:6px; color:#9A9A9A;">600</div></div>
    <div><div style="height:62px; border-radius:6px; background:#333333;"></div><div class="meta" style="margin-top:6px; color:#9A9A9A;">700</div></div>
    <div><div style="height:62px; border-radius:6px; background:#0F0F0F;"></div><div class="meta" style="margin-top:6px; color:#9A9A9A;">900</div></div>
  </div>
  <div style="font-size:12px; color:var(--ink-500);">Cold-neutral. No blue or warm cast. <span style="font-family:var(--font-mono); color:var(--ink-700);">900</span> is the logo black.</div>
</body></html>
