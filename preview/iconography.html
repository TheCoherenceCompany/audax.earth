<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .chip-icn {
    display:inline-flex; align-items:center; justify-content:center;
    width:44px; height:44px; border-radius:10px;
    background:var(--ink-050); border:1px solid var(--border-2);
    color: var(--ink-700);
  }
  .chip-icn.forest { background:var(--forest-050); border-color:var(--forest-200); color: var(--forest-800); }
  .chip-icn.lichen { background:var(--lichen-100); border-color:var(--lichen-300); color: var(--forest-900); }
  .chip-icn svg { width: 22px; height: 22px; stroke-width: 1.5; }
</style>
</head>
<body style="padding:28px 32px;">
  <div class="label">Iconography · Lucide · 1.5 stroke</div>
  <div class="row" style="gap:10px; flex-wrap:wrap;">
    <span class="chip-icn"><i data-lucide="circle-dot"></i></span>
    <span class="chip-icn"><i data-lucide="users-round"></i></span>
    <span class="chip-icn"><i data-lucide="orbit"></i></span>
    <span class="chip-icn"><i data-lucide="leaf"></i></span>
    <span class="chip-icn"><i data-lucide="sparkles"></i></span>
    <span class="chip-icn"><i data-lucide="compass"></i></span>
    <span class="chip-icn"><i data-lucide="message-circle"></i></span>
    <span class="chip-icn"><i data-lucide="git-fork"></i></span>
    <span class="chip-icn"><i data-lucide="book-open"></i></span>
    <span class="chip-icn"><i data-lucide="moon"></i></span>
    <span class="chip-icn forest"><i data-lucide="circle-check"></i></span>
    <span class="chip-icn lichen"><i data-lucide="sun"></i></span>
  </div>
  <div style="font-size:12px; color:var(--ink-500); line-height:1.55;">
    Lucide via CDN. Curated for the brand — organic & gathering concepts (orbit, leaf, circle-dot, users-round) over tool glyphs. 1.5 stroke matches Hanken Light. <strong style="color:var(--forest-800); font-weight:500;">No emoji</strong>, ever.
  </div>
  <script>window.lucide && lucide.createIcons();</script>
</body></html>
