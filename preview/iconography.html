<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<!-- Iconoir via Iconify <iconify-icon> custom element -->
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.1.0/dist/iconify-icon.min.js"></script>
<style>
  iconify-icon { color: var(--ink-700); }
  .chip-icn {
    display:inline-flex; align-items:center; justify-content:center;
    width:44px; height:44px; border-radius:10px;
    background:var(--ink-050); border:1px solid var(--border-2);
  }
  .chip-icn.teal { background:var(--teal-050); border-color:var(--teal-200); }
  .chip-icn.teal iconify-icon { color: var(--teal-900); }
</style>
</head>
<body style="padding:28px 32px;">
  <div class="label">Iconography · Iconoir · unusual set</div>
  <div class="row" style="gap:10px; flex-wrap:wrap;">
    <span class="chip-icn"><iconify-icon icon="iconoir:multi-bubble"     width="22" height="22"></iconify-icon></span>
    <span class="chip-icn"><iconify-icon icon="iconoir:infinite"         width="22" height="22"></iconify-icon></span>
    <span class="chip-icn"><iconify-icon icon="iconoir:network-left"     width="22" height="22"></iconify-icon></span>
    <span class="chip-icn"><iconify-icon icon="iconoir:compass"          width="22" height="22"></iconify-icon></span>
    <span class="chip-icn"><iconify-icon icon="iconoir:crystal-ball"     width="22" height="22"></iconify-icon></span>
    <span class="chip-icn"><iconify-icon icon="iconoir:puzzle"           width="22" height="22"></iconify-icon></span>
    <span class="chip-icn"><iconify-icon icon="iconoir:bezier-curve"     width="22" height="22"></iconify-icon></span>
    <span class="chip-icn"><iconify-icon icon="iconoir:design-pencil"    width="22" height="22"></iconify-icon></span>
    <span class="chip-icn"><iconify-icon icon="iconoir:community"        width="22" height="22"></iconify-icon></span>
    <span class="chip-icn"><iconify-icon icon="iconoir:language"         width="22" height="22"></iconify-icon></span>
    <span class="chip-icn"><iconify-icon icon="iconoir:terminal"         width="22" height="22"></iconify-icon></span>
    <span class="chip-icn teal"><iconify-icon icon="iconoir:spark-solid" width="22" height="22"></iconify-icon></span>
  </div>
  <div style="font-size:12px; color:var(--ink-500); line-height:1.55;">
    Iconoir Regular via Iconify CDN. Curated for the brand: organic concepts (infinite, multi-bubble, crystal-ball, spark) over generic tool glyphs. 1.5 stroke matches Lexend Light.
  </div>
</body></html>
