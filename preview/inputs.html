<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--ink-700); letter-spacing: 0.02em; }
  .field input, .field textarea { font-family: var(--font-sans); font-weight: 300; font-size: 14px; color: var(--ink-900); padding: 11px 14px; border-radius: 8px; border: 1px solid var(--ink-200); background: #fff; outline: none; transition: border-color 180ms, box-shadow 180ms; }
  .field input::placeholder { color: var(--ink-400); }
  .field input:focus { border-color: var(--teal-500); box-shadow: 0 0 0 3px rgba(75,219,219,0.35); }
  .field .hint { font-size: 11px; color: var(--ink-500); }
  .field-error input { border-color: #D9534F; }
  .field-error .hint { color: #D9534F; }
</style>
</head>
<body style="padding:28px 32px;">
  <div class="label">Inputs</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
    <div class="field">
      <label>Name</label>
      <input value="Mira Castelletti">
    </div>
    <div class="field">
      <label>Project</label>
      <input placeholder="What are you working on?">
    </div>
    <div class="field" style="grid-column:1/-1;">
      <label>Email</label>
      <input value="mira@studio.co" style="border-color:var(--teal-500); box-shadow: 0 0 0 3px rgba(75,219,219,0.35);">
      <div class="hint">Focused — 3px teal ring at 35% alpha.</div>
    </div>
    <div class="field field-error" style="grid-column:1/-1;">
      <label>Phone</label>
      <input value="+1 (555)" >
      <div class="hint">Please enter a complete number.</div>
    </div>
  </div>
</body></html>
