<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .btn { font-family: var(--font-sans); font-weight: 400; font-size: 14px; padding: 11px 22px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; line-height: 1; letter-spacing: 0; transition: background 200ms, color 200ms, border-color 200ms, box-shadow 200ms; }
  .btn-primary { background: var(--forest-700); color: #fff; }
  .btn-primary:hover { background: var(--forest-800); }
  .btn-accent { background: var(--lichen-500); color: var(--forest-900); }
  .btn-accent:hover { background: var(--lichen-400); }
  .btn-secondary { background: transparent; color: var(--ink-900); border-color: var(--ink-300); }
  .btn-secondary:hover { border-color: var(--ink-900); }
  .btn-ghost { background: transparent; color: var(--ink-700); border-color: transparent; }
  .btn-ghost:hover { color: var(--ink-900); background: var(--ink-050); }
  .btn-disabled { background: var(--ink-100); color: var(--ink-400); cursor: not-allowed; }
  .btn-sm { padding: 8px 14px; font-size: 13px; }
  .lichen-500 { background: #B8C766; }
</style>
</head>
<body style="padding:28px 32px;">
  <div class="label">Buttons</div>
  <div class="row" style="flex-wrap:wrap; gap:10px;">
    <button class="btn btn-primary">Open the OS</button>
    <button class="btn btn-accent">Start a circle</button>
    <button class="btn btn-secondary">Read more</button>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-primary btn-disabled">Listening…</button>
  </div>
  <div class="row" style="gap:10px;">
    <button class="btn btn-primary btn-sm">Small primary</button>
    <button class="btn btn-secondary btn-sm">Small secondary</button>
    <button class="btn btn-ghost btn-sm">Small ghost</button>
  </div>
  <div style="font-size:12px; color:var(--ink-500);">Sentence case. 1–3 words. <strong style="color:var(--forest-800); font-weight:500;">Primary is forest</strong>; lichen is reserved for the single hero or "begin" CTA. Never two lichen buttons on the same screen.</div>
</body></html>
