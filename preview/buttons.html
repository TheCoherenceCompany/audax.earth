<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .btn { font-family: var(--font-sans); font-weight: 400; font-size: 14px; padding: 11px 22px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; line-height: 1; letter-spacing: 0; transition: background 180ms, color 180ms, border-color 180ms, box-shadow 180ms; }
  .btn-primary { background: var(--teal-800); color: #fff; }
  .btn-primary:hover { background: var(--teal-900); }
  .btn-accent { background: var(--teal-500); color: var(--ink-900); }
  .btn-accent:hover { background: var(--teal-700); color: #fff; }
  .btn-secondary { background: transparent; color: var(--ink-900); border-color: var(--ink-300); }
  .btn-secondary:hover { border-color: var(--ink-900); }
  .btn-ghost { background: transparent; color: var(--ink-700); border-color: transparent; }
  .btn-ghost:hover { color: var(--ink-900); background: var(--ink-050); }
  .btn-disabled { background: var(--ink-100); color: var(--ink-400); cursor: not-allowed; }
  .btn-sm { padding: 8px 14px; font-size: 13px; }
</style>
</head>
<body style="padding:28px 32px;">
  <div class="label">Buttons</div>
  <div class="row" style="flex-wrap:wrap; gap:10px;">
    <button class="btn btn-primary">Start a project</button>
    <button class="btn btn-accent">Get in touch</button>
    <button class="btn btn-secondary">Read more</button>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-primary btn-disabled">Submitting…</button>
  </div>
  <div class="row" style="gap:10px;">
    <button class="btn btn-primary btn-sm">Small primary</button>
    <button class="btn btn-secondary btn-sm">Small secondary</button>
    <button class="btn btn-ghost btn-sm">Small ghost</button>
  </div>
  <div style="font-size:12px; color:var(--ink-500);">Sentence case. 1–2 words. Never "Click here". Primary is ink; teal is reserved for the single hero CTA.</div>
</body></html>
