<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="label">Lichen · secondary highlight</div>
  <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap:8px;">
    <div><div style="height:72px; border-radius:8px; background:#F6F7E6; border:1px solid var(--border-2);"></div><div class="meta" style="margin-top:6px;">050</div></div>
    <div><div style="height:72px; border-radius:8px; background:#EEF0D2;"></div><div class="meta" style="margin-top:6px;">100</div></div>
    <div><div style="height:72px; border-radius:8px; background:#E3E8B5;"></div><div class="meta" style="margin-top:6px;">200</div></div>
    <div><div style="height:72px; border-radius:8px; background:#D6DD96;"></div><div class="meta" style="margin-top:6px;">300</div></div>
    <div><div style="height:72px; border-radius:8px; background:#C7D27B;"></div><div class="meta" style="margin-top:6px;">400</div></div>
    <div><div style="height:72px; border-radius:8px; background:#B8C766; box-shadow: inset 0 0 0 1px rgba(20,19,14,0.06);"></div><div class="meta" style="margin-top:6px; color:var(--ink-900); font-weight:500;">500 ●</div></div>
  </div>
  <div style="font-size:12px; color:var(--ink-500); line-height:1.55;">
    The single secondary highlight — appears at the edges of brand imagery. <span style="font-family:var(--font-mono); color:var(--ink-700);">--lichen-500 · #B8C766</span> is canonical. <strong style="color:var(--forest-800); font-weight:500;">Use rarely</strong> — a single active tag, a "now" indicator, the highlighted node in a graph. Never on body text.
  </div>
</body></html>
