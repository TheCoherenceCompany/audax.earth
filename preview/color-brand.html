<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="label">Brand · forest (primary accent)</div>
  <div style="display:grid; grid-template-columns: repeat(8, 1fr); gap:8px;">
    <div><div style="height:72px; border-radius:8px; background:#F0F4EC; border:1px solid var(--border-2);"></div><div class="meta" style="margin-top:6px;">050</div></div>
    <div><div style="height:72px; border-radius:8px; background:#E2EBDD;"></div><div class="meta" style="margin-top:6px;">100</div></div>
    <div><div style="height:72px; border-radius:8px; background:#C8DBC9;"></div><div class="meta" style="margin-top:6px;">200</div></div>
    <div><div style="height:72px; border-radius:8px; background:#9CBFA3;"></div><div class="meta" style="margin-top:6px;">300</div></div>
    <div><div style="height:72px; border-radius:8px; background:#6BA37C;"></div><div class="meta" style="margin-top:6px;">400</div></div>
    <div><div style="height:72px; border-radius:8px; background:#3F8657;"></div><div class="meta" style="margin-top:6px;">500</div></div>
    <div><div style="height:72px; border-radius:8px; background:#1F4D2E; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);"></div><div class="meta" style="margin-top:6px; color:var(--ink-900); font-weight:500;">700 ●</div></div>
    <div><div style="height:72px; border-radius:8px; background:#0E2419;"></div><div class="meta" style="margin-top:6px;">900</div></div>
  </div>
  <div style="font-size:12px; color:var(--ink-500); line-height:1.55;">
    <span style="font-family:var(--font-mono); color:var(--ink-700);">--forest-700 · #1F4D2E</span> is canonical — buttons, links, primary states. <span style="font-family:var(--font-mono);">800/900</span> are hover/sumi-e ink. Lighter steps carry mood without overpowering.
  </div>
</body></html>
