<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
  <div class="label">Brand · teal accent</div>
  <div style="display:grid; grid-template-columns: repeat(7, 1fr); gap:8px;">
    <!-- swatches -->
    <div><div style="height:72px; border-radius:8px; background:#EEFBFB; border:1px solid var(--border-2);"></div><div class="meta" style="margin-top:6px;">050</div></div>
    <div><div style="height:72px; border-radius:8px; background:#D6F6F6;"></div><div class="meta" style="margin-top:6px;">100</div></div>
    <div><div style="height:72px; border-radius:8px; background:#B1EFEF;"></div><div class="meta" style="margin-top:6px;">200</div></div>
    <div><div style="height:72px; border-radius:8px; background:#9DECEC;"></div><div class="meta" style="margin-top:6px;">300</div></div>
    <div><div style="height:72px; border-radius:8px; background:#6FE2E2;"></div><div class="meta" style="margin-top:6px;">400</div></div>
    <div><div style="height:72px; border-radius:8px; background:#4BDBDB; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);"></div><div class="meta" style="margin-top:6px; color:var(--ink-900); font-weight:500;">500 ●</div></div>
    <div><div style="height:72px; border-radius:8px; background:#2BB8B8;"></div><div class="meta" style="margin-top:6px;">700</div></div>
  </div>
  <div style="font-size:12px; color:var(--ink-500); line-height:1.55;">
    <span style="font-family:var(--font-mono); color:var(--ink-700);">--teal-500 · #4BDBDB</span> is canonical. Soft steps carry the brand mood; <span style="font-family:var(--font-mono);">700</span> is hover/active only.
  </div>
</body></html>
